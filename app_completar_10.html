<<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Didactimat – Completar 10</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:white;
    margin:0;
}

/* PORTADA */
.portada{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.portada h1{
    font-size:40px;
}

.portada p{
    font-size:22px;
    margin:10px;
}

.iniciar{
    margin-top:30px;
    padding:15px 40px;
    font-size:22px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* APP */

.logo{
    width:120px;
    margin-top:15px;
}

.marco{
    display:grid;
    grid-template-columns: repeat(5, 70px);
    grid-template-rows: repeat(2, 70px);
    gap:8px;
    justify-content:center;
    margin:20px;
}

.celda{
    width:70px;
    height:70px;
    border:2px solid black;
    background:#eee;
    display:flex;
    align-items:center;
    justify-content:center;
}

.punto{
    width:40px;
    height:40px;
    background:red;
    border-radius:50%;
}

.botones{
    display:grid;
    grid-template-columns: repeat(5, 55px);
    gap:8px;
    justify-content:center;
}

button{
    width:55px;
    height:55px;
    font-size:18px;
    border-radius:10px;
    border:none;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

#mensaje{
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
}

#contador{
    margin-top:5px;
    font-size:16px;
}

.final{
    padding:40px;
}

.final button{
    margin-top:20px;
    padding:12px 30px;
    font-size:18px;
    width:auto; /* 👈 SOLUCIÓN BOTÓN CORTADO */
}
</style>
</head>

<body>

<!-- PORTADA -->
<div id="portada" class="portada">
    <h1>Didactimat</h1>
    <p><strong>Nivel:</strong> Kinder</p>
    <p><strong>Habilidad:</strong> reconocer de inmediato cantidades hasta 10</p>
    <button class="iniciar" onclick="iniciar()">INICIAR</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<img src="logo.png" class="logo">

<h2>¿Cuántos puntos hay?</h2>

<div id="contador"></div>

<div class="marco" id="marco"></div>

<div class="botones" id="botones"></div>

<div id="mensaje"></div>

</div>

<script>
let cantidad = 0;
let ejercicio = 1;
let correctas = 0;

function iniciar(){
    document.getElementById("portada").style.display="none";
    document.getElementById("app").style.display="block";
}

function generar(){

    if(ejercicio > 20){
        document.body.innerHTML = `
        <div class="final">
        <h1>Resultados</h1>
        <p>Respuestas correctas: ${correctas} de 20</p>
        <button onclick="location.reload()">Reiniciar</button>
        </div>
        `;
        return;
    }

    document.getElementById("contador").innerText = "Ejercicio " + ejercicio + " de 20";

    const marco = document.getElementById("marco");
    marco.innerHTML = "";

    let extra = Math.floor(Math.random()*5)+1;
    cantidad = 5 + extra;

    let cincoArriba = Math.random() < 0.5;

    for(let i=0;i<10;i++){
        let celda = document.createElement("div");
        celda.className = "celda";

        let poner = false;

        if(cincoArriba){
            if(i < 5) poner = true;
            if(i >=5 && i < 5+extra) poner = true;
        }else{
            if(i >=5) poner = true;
            if(i < extra) poner = true;
        }

        if(poner){
            let punto = document.createElement("div");
            punto.className = "punto";
            celda.appendChild(punto);
        }

        marco.appendChild(celda);
    }

    document.getElementById("mensaje").innerText="";
}

function crearBotones(){
    const cont = document.getElementById("botones");

    for(let i=1;i<=10;i++){
        let btn = document.createElement("button");
        btn.innerText = i;

        btn.onclick = function(){
            if(i === cantidad){
                correctas++;
                document.getElementById("mensaje").innerText="¡Muy bien!";
            }else{
                document.getElementById("mensaje").innerText="Intenta de nuevo";
                return;
            }

            ejercicio++;
            setTimeout(generar,800);
        };

        cont.appendChild(btn);
    }
}

crearBotones();
generar();
</script>

</body>
</html>
