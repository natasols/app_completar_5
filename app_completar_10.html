<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Didactimat – Completar 10</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:white;
}

.logo{
    width:120px;
    margin-top:20px;
}

.marco{
    display:grid;
    grid-template-columns: repeat(5, 80px);
    grid-template-rows: repeat(2, 80px);
    gap:8px;
    justify-content:center;
    margin:30px;
}

.celda{
    width:80px;
    height:80px;
    border:2px solid black; /* MÁS DELGADO */
    background:#eee;
    display:flex;
    align-items:center;
    justify-content:center;
}

.punto{
    width:50px;
    height:50px;
    background:red;
    border-radius:50%;
}

.botones{
    display:grid;
    grid-template-columns: repeat(5, 60px);
    gap:10px;
    justify-content:center;
}

button{
    width:60px;
    height:60px;
    font-size:20px;
    border-radius:10px;
    border:none;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

#mensaje{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}

#contador{
    margin-top:10px;
    font-size:18px;
}

</style>
</head>

<body>

<img src="logo.png" class="logo">

<h2>¿Cuántos puntos hay?</h2>

<div id="contador"></div>

<div class="marco" id="marco"></div>

<div class="botones" id="botones"></div>

<div id="mensaje"></div>

<script>
let cantidad = 0;
let ejercicio = 1;
let correctas = 0;

function generar(){

    if(ejercicio > 20){
        document.body.innerHTML = `
        <h1>Resultados</h1>
        <p>Respuestas correctas: ${correctas} de 20</p>
        <button onclick="location.reload()">Reiniciar</button>
        `;
        return;
    }

    document.getElementById("contador").innerText = "Ejercicio " + ejercicio + " de 20";

    const marco = document.getElementById("marco");
    marco.innerHTML = "";

    let extra = Math.floor(Math.random()*5)+1; // 1 a 5
    cantidad = 5 + extra;

    let cincoArriba = Math.random() < 0.5;

    for(let i=0;i<10;i++){
        let celda = document.createElement("div");
        celda.className = "celda";

        let ponerPunto = false;

        if(cincoArriba){
            if(i < 5 && i < 5){
                ponerPunto = true;
            }
            if(i >=5 && i < 5 + extra){
                ponerPunto = true;
            }
        }else{
            if(i >=5 && i <10){
                if(i-5 < 5){
                    ponerPunto = true;
                }
            }
            if(i < extra){
                ponerPunto = true;
            }
        }

        if(ponerPunto){
            let punto = document.createElement("div");
            punto.className = "punto";
            celda.appendChild(punto);
        }

        marco.appendChild(celda);
    }

    document.getElementById("mensaje").innerText="";
}

function crearBotones(){
    const cont = document.getElementById("botones");

    for(let i=1;i<=10;i++){
        let btn = document.createElement("button");
        btn.innerText = i;

        btn.onclick = function(){
            if(i === cantidad){
                correctas++;
                document.getElementById("mensaje").innerText="¡Muy bien!";
            }else{
                document.getElementById("mensaje").innerText="Intenta de nuevo";
                return;
            }

            ejercicio++;
            setTimeout(generar,800);
        };

        cont.appendChild(btn);
    }
}

crearBotones();
generar();
</script>

</body>
</html>
