<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Didactimat – Completar 10</title>

<style>
body{
    font-family: Arial;
    text-align:center;
}

.logo{
    width:120px;
    margin-top:20px;
}

.marco{
    display:grid;
    grid-template-columns: repeat(5,80px);
    gap:8px;
    justify-content:center;
    margin-top:30px;
}

.casilla{
    width:80px;
    height:80px;
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ddd;
}

.punto{
    width:40px;
    height:40px;
    border-radius:50%;
    background:red;
}

.verde{
    background:green;
}

.boton{
    margin:10px;
    padding:15px 20px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<h2>¿Cuántas faltan para completar 10?</h2>
<p id="info"></p>

<div id="marco"></div>
<div id="botones"></div>

<script>

let ejercicio = 0;
let total = 20;
let cantidad = 0;
let respuestaCorrecta = 0;
let aciertos = 0;

// 🔥 guardamos el estado real del marco
let estado = [];

function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    cantidad = Math.floor(Math.random()*4)+6; // 6 a 9
    respuestaCorrecta = 10 - cantidad;

    document.getElementById("info").innerText = "Ejercicio " + ejercicio + " de 20";

    let marco = document.getElementById("marco");
    marco.innerHTML = "";

    estado = Array(10).fill(0);

    let extra = cantidad - 5;
    let arribaCompleta = Math.random() < 0.5;

    if(arribaCompleta){
        // fila arriba completa
        for(let i=0;i<5;i++){
            estado[i] = 1;
        }
        for(let i=0;i<extra;i++){
            estado[5+i] = 1;
        }
    }else{
        // fila abajo completa
        for(let i=5;i<10;i++){
            estado[i] = 1;
        }
        for(let i=0;i<extra;i++){
            estado[i] = 1;
        }
    }

    // dibujar
    for(let i=0;i<10;i++){
        let div = document.createElement("div");
        div.className="casilla";

        if(estado[i] == 1){
            div.innerHTML = '<div class="punto"></div>';
        }

        marco.appendChild(div);
    }

    // botones
    let botones = document.getElementById("botones");
    botones.innerHTML="";

    for(let i=1;i<=5;i++){
        botones.innerHTML += `<button class="boton" onclick="verificar(${i})">${i}</button>`;
    }
}

function verificar(resp){

    if(resp == respuestaCorrecta){

        aciertos++;

        mostrarSolucion();

        setTimeout(()=>{
            nuevoEjercicio();
        },1200);

    }else{
        alert("Intenta nuevamente");
    }
}

function mostrarSolucion(){

    let casillas = document.querySelectorAll(".casilla");

    for(let i=0;i<10;i++){
        if(estado[i] == 0){
            casillas[i].innerHTML = '<div class="punto verde"></div>';
        }
    }
}

function mostrarFinal(){

    document.body.innerHTML = `
        <h1>RESULTADOS</h1>
        <p>Respuestas correctas: ${aciertos} de 20</p>
        <button class="boton" onclick="location.reload()">REINICIAR</button>
    `;
}

nuevoEjercicio();

</script>

</body>
</html>
