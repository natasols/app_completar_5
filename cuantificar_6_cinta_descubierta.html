<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Cinta Descubierta</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:white;
}

.logo{
    width:120px;
    margin-top:20px;
}

.boton{
    margin:10px;
    padding:15px 25px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* FILA PUNTOS */
.fila-puntos{
    display:grid;
    grid-template-columns: repeat(6,80px);
    justify-content:center;
    margin-top:30px;
    margin-bottom:18px;
}

/* CINTA */
.cinta{
    display:grid;
    grid-template-columns: repeat(6,80px);
    justify-content:center;
}

/* CASILLA */
.casilla{
    width:80px;
    height:60px;
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
}

/* PUNTO */
.punto{
    width:45px;
    height:45px;
    border-radius:50%;
    background:red;
    margin:auto;
}

/* RELOJ */
.reloj{
    font-size:60px;
    margin-top:20px;
}

/* OCULTAR */
.oculto{
    visibility:hidden;
}

</style>
</head>

<body>

<div id="pantalla"></div>

<script>

let cantidad = 0;

/* VOZ */
function hablar(texto){
    let m = new SpeechSynthesisUtterance(texto);
    m.lang = "es-ES";
    speechSynthesis.speak(m);
}

/* INICIO */
function iniciar(){

    cantidad = Math.floor(Math.random()*6)+1;

    document.getElementById("pantalla").innerHTML = `
        <img src="logo.png" class="logo">
        <h2>¿Cuántas hay?</h2>

        <div id="puntos" class="fila-puntos"></div>
        <div id="cinta" class="cinta"></div>

        <button class="boton" onclick="mostrarReloj()">INICIAR EJERCICIO</button>
    `;

    let puntos = document.getElementById("puntos");
    let cinta = document.getElementById("cinta");

    for(let i=1;i<=6;i++){

        let cont = document.createElement("div");

        if(i<=cantidad){
            let p = document.createElement("div");
            p.className="punto";
            cont.appendChild(p);
        }

        puntos.appendChild(cont);

        let cas = document.createElement("div");
        cas.className="casilla";
        cas.innerText=i;

        cinta.appendChild(cas);
    }
}

/* RELOJ */
function mostrarReloj(){

    document.getElementById("pantalla").innerHTML += `
        <div id="reloj" class="reloj">⏳</div>
    `;

    setTimeout(ocultarTodo,4000);
}

/* OCULTAR */
function ocultarTodo(){

    document.getElementById("puntos").classList.add("oculto");
    document.getElementById("cinta").classList.add("oculto");
    document.getElementById("reloj").remove();

    document.getElementById("pantalla").innerHTML += `
        <button class="boton" onclick="verificar()">VERIFICAR</button>
    `;
}

/* VERIFICAR */
function verificar(){

    document.getElementById("puntos").classList.remove("oculto");
    document.getElementById("cinta").classList.remove("oculto");

    hablar("Había " + cantidad);
}

/* INICIO AUTOMÁTICO */
iniciar();

</script>

</body>
</html>
