<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Cinta Descubierta</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:white;
}

.logo{
    width:120px;
    margin-top:20px;
}

.boton{
    margin:10px;
    padding:15px 25px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.contador{
    margin-top:10px;
    font-size:16px;
    color:#555;
}

.fila-puntos{
    display:grid;
    grid-template-columns: repeat(6,80px);
    justify-content:center;
    margin-top:30px;
    margin-bottom:18px;
}

.cinta{
    display:grid;
    grid-template-columns: repeat(6,80px);
    justify-content:center;
}

.casilla{
    width:80px;
    height:60px;
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    position:relative;
}

/* CÍRCULO */
.correcto::after{
    content:"";
    position:absolute;
    width:50px;
    height:50px;
    border:3px solid #4CAF50;
    border-radius:50%;
}

.punto{
    width:45px;
    height:45px;
    border-radius:50%;
    background:red;
    margin:auto;
}

.reloj{
    font-size:60px;
    margin-top:20px;
}

.oculto{
    visibility:hidden;
}
</style>
</head>

<body>

<div id="pantalla"></div>

<script>

let cantidad = 0;
let ejercicio = 0;
let total = 20;

/* VOZ */
function hablar(texto){
    let m = new SpeechSynthesisUtterance(texto);

    let voces = speechSynthesis.getVoices();

    let voz =
        voces.find(v => v.lang === "es-CL") ||
        voces.find(v => v.lang.startsWith("es"));

    if(voz) m.voice = voz;

    m.rate = 0.9;
    m.pitch = 1.2;

    speechSynthesis.speak(m);
}

/* NUEVO EJERCICIO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    cantidad = Math.floor(Math.random()*6)+1;

    document.getElementById("pantalla").innerHTML = `
        <img src="logo.png" class="logo">
        <h2>¿Cuántas hay?</h2>
        <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

        <div id="puntos"></div>
        <div id="cinta"></div>

        <div id="botonera">
            <button class="boton" onclick="iniciarEjercicio()">INICIAR EJERCICIO</button>
        </div>
    `;
}

/* INICIAR */
function iniciarEjercicio(){

    let puntos = document.getElementById("puntos");
    let cinta = document.getElementById("cinta");

    puntos.className = "fila-puntos";
    cinta.className = "cinta";

    puntos.innerHTML = "";
    cinta.innerHTML = "";

    for(let i=1;i<=6;i++){

        let cont = document.createElement("div");

        if(i<=cantidad){
            let p = document.createElement("div");
            p.className="punto";
            cont.appendChild(p);
        }

        puntos.appendChild(cont);

        let cas = document.createElement("div");
        cas.className="casilla";
        cas.id="num"+i;
        cas.innerText=i;

        cinta.appendChild(cas);
    }

    document.getElementById("botonera").innerHTML = `<div class="reloj">⏳</div>`;

    setTimeout(ocultarTodo,3000); /* 🔥 AHORA 3 SEGUNDOS */
}

/* OCULTAR */
function ocultarTodo(){

    document.getElementById("puntos").classList.add("oculto");
    document.getElementById("cinta").classList.add("oculto");

    document.getElementById("botonera").innerHTML = `
        <button class="boton" onclick="mostrarRespuesta()">VERIFICAR</button>
    `;
}

/* VERIFICAR */
function mostrarRespuesta(){

    document.getElementById("puntos").classList.remove("oculto");
    document.getElementById("cinta").classList.remove("oculto");

    let correcto = document.getElementById("num"+cantidad);
    correcto.classList.add("correcto");

    hablar("Había " + cantidad);

    document.getElementById("botonera").innerHTML = `
        <button class="boton" onclick="nuevoEjercicio()">SIGUIENTE</button>
    `;
}

/* FINAL */
function mostrarFinal(){

    document.getElementById("pantalla").innerHTML = `
        <h1>¡Felicitaciones!</h1>
        <p>¡Buen trabajo pensando sin contar!</p>
        <button class="boton" onclick="reiniciar()">REINICIAR</button>
    `;
}

function reiniciar(){
    ejercicio = 0;
    nuevoEjercicio();
}

nuevoEjercicio();

</script>

</body>
</html>
