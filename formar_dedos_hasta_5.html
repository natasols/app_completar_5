<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Formar dedos hasta 5</title>

<style>
body{
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align:center;
    background:white;
}

.logo{
    width:120px;
    margin-top:20px;
}

.numero{
    font-size:160px;
    color:#d32f2f;
    margin:30px 0;
    font-weight:bold;
}

.contenedor-manos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:60px;
    margin-top:40px;
}

.mano{
    width:240px;
}

.izquierda{
    transform: scaleX(-1);
}

.boton{
    margin:12px;
    padding:14px 24px;
    font-size:16px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.mensaje{
    margin-top:20px;
    font-size:26px;
    font-weight:500;
    letter-spacing:0.5px;
}

.contador{
    margin-top:10px;
    color:#555;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

/* 🔊 VOZ MEJORADA */
function hablar(texto){

    speechSynthesis.cancel();

    let msg = new SpeechSynthesisUtterance(texto);

    msg.lang = "es-ES";
    msg.rate = 0.9;
    msg.pitch = 1.3;

    let voces = speechSynthesis.getVoices();

    let voz =
        voces.find(v => v.name.includes("Google español")) ||
        voces.find(v => v.name.includes("Paulina")) ||
        voces.find(v => v.name.includes("Helena")) ||
        voces.find(v => v.name.includes("Laura")) ||
        voces.find(v => v.name.includes("Maria")) ||
        voces.find(v => v.lang.startsWith("es"));

    if(voz){
        msg.voice = voz;
    }

    speechSynthesis.speak(msg);
}

/* VARIABLES */
let ejercicio = 0;
let total = 12;
let numero = 0;
let secuencia = [];

let configuraciones = {
    2: [[2],[1,1]],
    3: [[3],[2,1]],
    4: [[4],[3,1],[2,2]],
    5: [[5],[4,1],[3,2]]
};

let listaActual = [];
let paso = 0;

/* GENERAR SECUENCIA BALANCEADA */
function generarSecuencia(){

    let base = [2,3,4,5, 2,3,4,5, 2,3,4,5];

    for(let i = base.length -1; i>0; i--){
        let j = Math.floor(Math.random()*(i+1));
        [base[i], base[j]] = [base[j], base[i]];
    }

    secuencia = base;
}

/* PORTADA */
function mostrarPortada(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <h2>Formar cantidades con los dedos</h2>
        <button class="boton" onclick="iniciar()">Iniciar</button>
    `;
}

/* INICIAR */
function iniciar(){
    ejercicio = 0;
    generarSecuencia();
    nuevoEjercicio();
}

/* NUEVO EJERCICIO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    numero = secuencia[ejercicio-1];
    listaActual = configuraciones[numero];
    paso = 0;

    faseUnaMano();
}

/* FASE 1 */
function faseUnaMano(){

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

        <div class="numero">${numero}</div>

        <div class="mensaje">Forma el ${numero} con una mano</div>

        <button class="boton" onclick="mostrarCanonica()">Siguiente</button>
    `;

    hablar("Forma el " + numero + " con una mano");
}

/* RESPUESTA CANÓNICA */
function mostrarCanonica(){

    let valor = listaActual[0][0];

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

        <div class="contenedor-manos">
            <img src="mano_${valor}.png" class="mano">
        </div>

        <div class="mensaje">¿Lo hiciste así?</div>

        <button class="boton" onclick="faseDosManos()">Siguiente</button>
    `;

    hablar("¿Lo hiciste así?");
}

/* FASE 2 */
function faseDosManos(){

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

        <div class="numero">${numero}</div>

        <div class="mensaje">Ahora forma el ${numero} con dos manos</div>

        <button class="boton" onclick="mostrarDescomposicion()">Verificar</button>
    `;

    hablar("Ahora forma el " + numero + " con dos manos");
}

/* MOSTRAR DESCOMPOSICIONES */
function mostrarDescomposicion(){
    paso = 1;
    mostrarPaso();
}

function mostrarPaso(){

    let config = listaActual[paso];

    let htmlManos = "";

    if(config.length === 1){
        htmlManos = `<img src="mano_${config[0]}.png" class="mano">`;
    }else{
        htmlManos = `
            <img src="mano_${config[0]}.png" class="mano izquierda">
            <img src="mano_${config[1]}.png" class="mano">
        `;
    }

    let boton = "";

    if(paso < listaActual.length - 1){
        boton = `<button class="boton" onclick="siguientePaso()">Otra forma</button>`;
    }else{
        boton = `<button class="boton" onclick="nuevoEjercicio()">Siguiente</button>`;
    }

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

        <div class="contenedor-manos">
            ${htmlManos}
        </div>

        <div class="mensaje">¿Lo hiciste así?</div>

        ${boton}
    `;

    hablar("También se puede hacer así");
}

function siguientePaso(){
    paso++;
    mostrarPaso();
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("app").innerHTML = `
        <h1>¡Felicitaciones!</h1>
        <p>Terminaste la actividad</p>
        <button class="boton" onclick="mostrarPortada()">Reiniciar</button>
    `;

    hablar("Felicitaciones. Terminaste la actividad");
}

/* INICIO */
mostrarPortada();

</script>

</body>
</html>
