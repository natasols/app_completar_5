<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Formar dedos hasta 5</title>

<style>
body{
    font-family: 'Segoe UI', 'Arial Rounded MT Bold', sans-serif;
    text-align:center;
    background:#f4f6f8;
}

.logo{
    width:120px;
    margin-top:20px;
}

.numero{
    font-size:140px;
    color:#d32f2f;
    margin:20px 0;
}

.manos{
    display:flex;
    justify-content:center;
    gap:60px;
    margin:30px;
}

.mano{
    width:200px;
}

.mano.izq{
    transform: scaleX(-1);
}

.boton{
    padding:14px 22px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-top:20px;
}

.texto{
    font-size:22px;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

/* 🔊 VOZ FEMENINA FORZADA */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-ES";
    msg.rate = 0.9;

    let voces = speechSynthesis.getVoices();

    let voz = voces.find(v =>
        v.name.toLowerCase().includes("female") ||
        v.name.toLowerCase().includes("mujer") ||
        v.name.toLowerCase().includes("google español")
    );

    if(voz) msg.voice = voz;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* 🔁 VARIABLES */
let numeros = [2,3,4,5];
let secuencia = [];
let index = 0;
let numeroActual = 0;
let paso = 0;
let subPaso = 0;

/* 🔀 EVITAR REPETICIÓN */
function generarSecuencia(){
    secuencia = [...numeros];

    for(let i=secuencia.length-1;i>0;i--){
        let j = Math.floor(Math.random()*(i+1));
        [secuencia[i],secuencia[j]] = [secuencia[j],secuencia[i]];
    }
}

/* 🚀 INICIO */
function iniciar(){
    generarSecuencia();
    index = 0;
    siguienteNumero();
}

/* 🔢 NUEVO NÚMERO */
function siguienteNumero(){
    if(index >= secuencia.length){
        generarSecuencia();
        index = 0;
    }

    numeroActual = secuencia[index];
    index++;

    paso = 1;
    subPaso = 0;

    pantallaNumero();
}

/* 🧩 PANTALLA 1 */
function pantallaNumero(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="numero">${numeroActual}</div>
        <div class="texto">FORMA EL ${numeroActual} CON UNA MANO</div>
        <button class="boton" onclick="verificar()">VERIFICAR</button>
    `;

    hablar("Forma el " + numeroActual + " con una mano");
}

/* ✔ VERIFICAR */
function verificar(){
    paso = 2;
    subPaso = 0;
    mostrarFormasUnaMano();
}

/* 🖐 FORMAS UNA MANO */
function mostrarFormasUnaMano(){

    let formas = [];

    if(numeroActual == 2){
        formas = [
            "mano_2.png",
            "mano_2_alt1.png",
            "mano_2_alt2.png"
        ];
    }
    else if(numeroActual == 3){
        formas = [
            "mano_3.png",
            "mano_3_alt1.png",
            "mano_3_alt2.png"
        ];
    }
    else{
        formas = ["mano_" + numeroActual + ".png"];
    }

    let textos = [
        "Una forma es esta",
        "También puedes hacerlo así",
        "Otra forma es esta"
    ];

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="texto">${textos[subPaso]}</div>
        <div class="manos">
            <img src="${formas[subPaso]}" class="mano">
        </div>
        <button class="boton" onclick="siguienteFormaUnaMano(${formas.length})">
            ${subPaso < formas.length-1 ? "OTRA FORMA" : "SIGUIENTE"}
        </button>
    `;

    hablar(textos[subPaso]);
}

/* ➡ SIGUIENTE FORMA */
function siguienteFormaUnaMano(total){
    subPaso++;

    if(subPaso < total){
        mostrarFormasUnaMano();
    }else{
        paso = 3;
        pantallaDosManos();
    }
}

/* ✌ DOS MANOS */
function pantallaDosManos(){

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="numero">${numeroActual}</div>
        <div class="texto">AHORA FORMA EL ${numeroActual} CON DOS MANOS</div>
        <button class="boton" onclick="mostrarRespuestaDosManos()">VERIFICAR</button>
    `;

    hablar("Ahora forma el " + numeroActual + " con dos manos");
}

/* 🧠 RESPUESTA DOS MANOS */
function mostrarRespuestaDosManos(){

    let izq = 1;
    let der = numeroActual - 1;

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="texto">Una forma es esta</div>
        <div class="manos">
            <img src="mano_${izq}.png" class="mano izq">
            <img src="mano_${der}.png" class="mano">
        </div>
        <button class="boton" onclick="siguienteNumero()">SIGUIENTE</button>
    `;

    hablar("También se puede hacer así");
}

/* 🚀 START */
iniciar();

</script>

</body>
</html>
