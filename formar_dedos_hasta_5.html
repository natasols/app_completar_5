<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Formar dedos hasta 5</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:white;
}

.logo{
    width:120px;
    margin-top:20px;
}

.numero{
    font-size:120px;
    margin:30px 0;
    font-weight:bold;
}

.contenedor-manos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:60px;
    margin-top:40px;
}

.mano{
    width:180px;
}

.boton{
    margin:12px;
    padding:14px 24px;
    font-size:16px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.mensaje{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

.contador{
    margin-top:10px;
    color:#555;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

/* 🔊 VOZ MEJORADA */
function hablar(texto){

    let msg = new SpeechSynthesisUtterance(texto);

    msg.lang = "es-ES";
    msg.rate = 0.85;
    msg.pitch = 1.2;

    function setVoice(){
        let voces = speechSynthesis.getVoices();

        let voz = voces.find(v =>
            v.lang.startsWith("es") &&
            (v.name.includes("Female") || v.name.includes("Google"))
        );

        if(voz) msg.voice = voz;

        speechSynthesis.speak(msg);
    }

    if(speechSynthesis.getVoices().length === 0){
        speechSynthesis.onvoiceschanged = setVoice;
    }else{
        setVoice();
    }
}

/* VARIABLES */
let ejercicio = 0;
let total = 12;
let numero = 0;

let configuraciones = {
    2: [[2],[1,1]],
    3: [[3],[2,1]],
    4: [[4],[3,1],[2,2]],
    5: [[5],[4,1],[3,2]]
};

let listaActual = [];
let paso = 0;

/* PORTADA */
function mostrarPortada(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <h2>Formar cantidades con los dedos</h2>
        <button class="boton" onclick="iniciar()">INICIAR</button>
    `;
}

/* INICIAR */
function iniciar(){
    ejercicio = 0;
    nuevoEjercicio();
}

/* NUEVO EJERCICIO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    numero = Math.floor(Math.random()*4)+2;

    listaActual = configuraciones[numero];
    paso = 0;

    faseUnaMano();
}

/* FASE 1 */
function faseUnaMano(){

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

        <div class="numero">${numero}</div>

        <div class="mensaje">FORMA EL ${numero} CON UNA MANO</div>

        <button class="boton" onclick="mostrarCanonica()">SIGUIENTE</button>
    `;

    hablar("Forma el " + numero + " con una mano");
}

/* MOSTRAR FORMA CANÓNICA */
function mostrarCanonica(){

    let valor = listaActual[0][0];

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

        <div class="contenedor-manos">
            <img src="mano_${valor}.png" class="mano">
        </div>

        <div class="mensaje">¿Lo hiciste así?</div>

        <button class="boton" onclick="faseDosManos()">SIGUIENTE</button>
    `;

    hablar("¿Lo hiciste así?");
}

/* FASE 2 */
function faseDosManos(){

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

        <div class="numero">${numero}</div>

        <div class="mensaje">AHORA FORMA EL ${numero} CON DOS MANOS</div>

        <button class="boton" onclick="mostrarDescomposicion()">VERIFICAR</button>
    `;

    hablar("Ahora forma el " + numero + " con dos manos");
}

/* MOSTRAR DESCOMPOSICIONES */
function mostrarDescomposicion(){

    paso = 1;
    mostrarPaso();
}

function mostrarPaso(){

    let config = listaActual[paso];

    let htmlManos = "";

    if(config.length === 1){
        htmlManos = `<img src="mano_${config[0]}.png" class="mano">`;
    }else{
        htmlManos = `
            <img src="mano_${config[0]}.png" class="mano">
            <img src="mano_${config[1]}.png" class="mano">
        `;
    }

    let boton = "";

    if(paso < listaActual.length - 1){
        boton = `<button class="boton" onclick="siguientePaso()">OTRA FORMA</button>`;
    }else{
        boton = `<button class="boton" onclick="nuevoEjercicio()">SIGUIENTE</button>`;
    }

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

        <div class="contenedor-manos">
            ${htmlManos}
        </div>

        <div class="mensaje">¿Lo hiciste así?</div>

        ${boton}
    `;

    hablar("También se puede hacer así");
}

function siguientePaso(){
    paso++;
    mostrarPaso();
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("app").innerHTML = `
        <h1>¡Felicitaciones!</h1>
        <p>Terminaste la actividad</p>
        <button class="boton" onclick="mostrarPortada()">REINICIAR</button>
    `;

    hablar("Felicitaciones. Terminaste la actividad");
}

/* INICIO */
mostrarPortada();

</script>

</body>
</html>
